services:
  traefik:
    image: traefik:v3.7
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  website:
    build:
      context: ./website
      args:
        STRAPI_URL: https://evaan.dev/strapi
    restart: always
    ports:
      - "127.0.0.1:1338:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evaan-website.rule=Host(`evaan.dev`) || Host(`www.evaan.dev`)"
      - "traefik.http.routers.evaan-website.entrypoints=websecure"
      - "traefik.http.routers.evaan-website.tls=true"
      - "traefik.http.routers.evaan-website.priority=1"
      - "traefik.http.services.evaan-website.loadbalancer.server.port=80"

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d strapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    build:
      context: ./strapi
      args:
        PUBLIC_URL: https://evaan.dev/strapi
        STRAPI_ADMIN_BACKEND_URL: /strapi
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production

      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: https://evaan.dev/strapi
      STRAPI_ADMIN_BACKEND_URL: /strapi

      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: strapi
      DATABASE_SSL: "false"

      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      - ./strapi-uploads:/app/public/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evaan-strapi.rule=(Host(`evaan.dev`) || Host(`www.evaan.dev`)) && (Path(`/strapi`) || PathPrefix(`/strapi/`))"
      - "traefik.http.routers.evaan-strapi.entrypoints=websecure"
      - "traefik.http.routers.evaan-strapi.tls=true"
      - "traefik.http.routers.evaan-strapi.priority=100"
      - "traefik.http.middlewares.strapi-root-redirect.redirectregex.regex=^https?://([^/]+)/strapi/?$"
      - "traefik.http.middlewares.strapi-root-redirect.redirectregex.replacement=https://$${1}/strapi/admin"
      - "traefik.http.middlewares.strapi-root-redirect.redirectregex.permanent=true"
      - "traefik.http.middlewares.strapi-strip-prefix.stripprefix.prefixes=/strapi"
      - "traefik.http.services.evaan-strapi.loadbalancer.server.port=1337"