<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="icon" href="https://avatars.githubusercontent.com/u/41494790?v=4"><title>Evan Whelan - 404</title><link rel="stylesheet" href="/_astro/plus-jakarta-sans.D4D3YxiM.css"></head><body class="bg-[#0A65AC] font-jakarta text-neutral-200 min-h-screen"><div class="mx-auto w-full max-w-[150ch] pt-10 px-5"><p class="text-5xl md:text-[230px] pb-10">:(</p><span class="*:text-2xl md:*:text-3xl"><p class="leading-relaxed pb-10">The webpage has encountered an error and needs to restart. We're just collecting some error info, and then we'll restart for you.</p><p class="pb-10"><span id="percentage">0</span>% complete</p><a href="/" class="text-neutral-200 bg-[#0A65AC] hover:bg-neutral-200 hover:text-[#0A65AC]">Return Home</a></span><p class="md:text-md pt-8">Stop code: NOT_FOUND</p><p class="md:text-md">Path: <span id="path"></span></p></div><script>
      const pathElement = document.getElementById("path");

      if (pathElement) {
        pathElement.textContent = window.location.pathname;
      }

      const percentageElement = document.getElementById("percentage");
      const updatePercentage = () => {
        if (percentageElement) {
          percentageElement.textContent = Math.floor(Math.random() * 101).toString();

      };

      updatePercentage();
      setInterval(updatePercentage, 1000);
    </script></body></html>
